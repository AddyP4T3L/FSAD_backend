# Server Configuration
server.port=${PORT:9090}

# Database Configuration
spring.datasource.url=jdbc:h2:mem:campuscore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Secret (In production, use an environment variable)
jwt.secret=${JWT_SECRET:4f6d8a39e8b7c3d2f1e4a7b9c6d8e2f1a3b5c7d9e2f4a6b8c0d2e4f6a8b0c2d4}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,https://fsad-project-roan.vercel.app}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.adnan=DEBUG

# Disable Spring Boot DevTools automatic restart when running the packaged app
spring.devtools.restart.enabled=false
